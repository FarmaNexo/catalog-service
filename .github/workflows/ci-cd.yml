# =============================================================================
# FarmaNexo — catalog-service CI/CD Pipeline
# =============================================================================
# Gitflow:
#   feature/* → build + test only
#   develop   → build + test + push ECR (develop tag) + deploy ECS Dev
#   main      → build + test + push ECR (latest + semver) + deploy Prod (TBD)
# =============================================================================

name: catalog-service CI/CD

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  SERVICE_NAME: catalog-service
  ECR_REPOSITORY: farmanexo/catalog-service
  ECS_CLUSTER: farmanexo-dev-cluster
  ECS_SERVICE: farmanexo-dev-catalog-service
  AWS_REGION: us-east-1

# Required for OIDC token authentication with AWS
permissions:
  id-token: write
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# JOB 1: Build and Test (always runs)
# =============================================================================
jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Install swag CLI
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate Swagger docs
        run: swag init -g cmd/server/main.go --output docs --parseDependency --parseInternal

      - name: Build
        run: go build ./...

      - name: Run tests with race detection and coverage
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ===========================================================================
  # JOB 2: Push to ECR (only on develop or main)
  # ===========================================================================
  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    permissions:
      id-token: write
      contents: read

    outputs:
      image-tag: ${{ steps.build-image.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_DEV_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${SHORT_SHA::7}"

          # Build the Docker image
          docker build -t ${{ env.SERVICE_NAME }} .

          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            # Develop: tag with develop-{short sha} + latest
            IMAGE_TAG="develop-${SHORT_SHA}"
            docker tag ${{ env.SERVICE_NAME }} ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}
            docker tag ${{ env.SERVICE_NAME }} ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest
            docker push ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}
            docker push ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest
            echo "Pushed: ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG} + latest"

          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            # Main: tag with latest + versioned tag (date-sha)
            VERSION_TAG="v$(date +%Y%m%d)-${SHORT_SHA}"
            docker tag ${{ env.SERVICE_NAME }} ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest
            docker tag ${{ env.SERVICE_NAME }} ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${VERSION_TAG}
            docker push ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest
            docker push ${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${VERSION_TAG}
            echo "Pushed: latest + ${VERSION_TAG}"
            IMAGE_TAG="${VERSION_TAG}"
          fi

          echo "image-tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # JOB 3: Run DB migrations on Dev (only on develop, BEFORE deploy)
  # ===========================================================================
  # Lanza una task efimera Fargate con la imagen recien pusheada y el comando
  # override `migrate -path /app/migrations -database $DATABASE_URL up`.
  # Si falla, deploy-dev no corre (depende de este job).
  # ===========================================================================
  migrate-dev:
    name: Run Migrations (Dev)
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/develop'
    permissions:
      id-token: write
      contents: read

    env:
      MIGRATE_TASK_DEF: farmanexo-dev-catalog-service-migrate
      LOG_GROUP: /ecs/farmanexo-dev-catalog-service-migrate
      # Subnets privadas app (us-east-1a + us-east-1b) — mismas que usa el ECS service
      SUBNET_A: subnet-0f78a2d981ff02aa6
      SUBNET_B: subnet-007607dbecbf15787

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_DEV_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve service security group
        id: sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=farmanexo-dev-${{ env.SERVICE_NAME }}-sg" \
            --query 'SecurityGroups[0].GroupId' --output text \
            --region ${{ env.AWS_REGION }})
          if [ -z "${SG_ID}" ] || [ "${SG_ID}" == "None" ]; then
            echo "::error::No se encontro el SG farmanexo-dev-${{ env.SERVICE_NAME }}-sg"
            exit 1
          fi
          echo "sg-id=${SG_ID}" >> "$GITHUB_OUTPUT"
          echo "Service SG: ${SG_ID}"

      - name: Run migration task (Fargate)
        id: run-task
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ env.MIGRATE_TASK_DEF }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ env.SUBNET_A }},${{ env.SUBNET_B }}],securityGroups=[${{ steps.sg.outputs.sg-id }}],assignPublicIp=DISABLED}" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].taskArn' --output text)
          if [ -z "${TASK_ARN}" ] || [ "${TASK_ARN}" == "None" ]; then
            echo "::error::run-task no devolvio un ARN. Revisa permisos OIDC y task def."
            exit 1
          fi
          echo "task-arn=${TASK_ARN}" >> "$GITHUB_OUTPUT"
          echo "Started migration task: ${TASK_ARN}"

      - name: Wait for task to stop
        run: |
          aws ecs wait tasks-stopped \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks ${{ steps.run-task.outputs.task-arn }} \
            --region ${{ env.AWS_REGION }}

      - name: Dump logs + verify exit code
        run: |
          TASK_ARN="${{ steps.run-task.outputs.task-arn }}"

          echo "=== Migration task logs ==="
          aws logs tail "${LOG_GROUP}" --since 10m --region ${{ env.AWS_REGION }} || true
          echo "=========================="

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "${TASK_ARN}" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].containers[0].exitCode' --output text)

          REASON=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} \
            --tasks "${TASK_ARN}" \
            --region ${{ env.AWS_REGION }} \
            --query 'tasks[0].stoppedReason' --output text)

          echo "Exit code: ${EXIT_CODE}"
          echo "Stopped reason: ${REASON}"

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "::error::Migrations failed (exit ${EXIT_CODE}): ${REASON}"
            exit 1
          fi
          echo "Migrations applied successfully."

  # ===========================================================================
  # JOB 4: Deploy to Dev (only on develop, after migrations)
  # ===========================================================================
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: migrate-dev
    if: github.ref == 'refs/heads/develop'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_DEV_ACCOUNT_ID }}:role/github-actions-ecr-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          echo "Deploying ${{ env.SERVICE_NAME }} to Dev cluster..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to stabilize
        run: |
          echo "Waiting for ${{ env.ECS_SERVICE }} to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
          echo "Deployment complete."

  # ===========================================================================
  # JOB 5: Deploy to Prod (only on main — placeholder)
  # ===========================================================================
  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main'

    steps:
      # TODO: Enable when farmanexo-prod ECS cluster and services are created.
      # Will use:
      #   - AWS Account Prod: ${{ secrets.AWS_PROD_ACCOUNT_ID }}
      #   - ECS Cluster: farmanexo-prod-cluster
      #   - ECS Service: farmanexo-prod-catalog-service
      #   - OIDC role: arn:aws:iam::${{ secrets.AWS_PROD_ACCOUNT_ID }}:role/github-actions-ecr-role
      - name: Deploy to Prod (placeholder)
        run: |
          echo "Deploy to prod — coming soon"
          echo "Image tag: ${{ needs.push-to-ecr.outputs.image-tag }}"
          echo "Prod deployment will be enabled when farmanexo-prod environment is ready."

# =============================================================================
# SECRETS REQUERIDOS EN GITHUB (Settings → Secrets → Actions):
# AWS_DEV_ACCOUNT_ID  → ID de cuenta AWS Dev (no compartir)
# AWS_PROD_ACCOUNT_ID → ID de cuenta AWS Prod (no compartir)
# =============================================================================
