environment: production

server:
  host: 0.0.0.0
  port: 4003
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 120s

database:
  host: ${DB_HOST}
  port: 5432
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  db_name: catalog_db
  schema: catalog
  sslmode: require
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 10m

jwt:
  secret: ${JWT_SECRET}
  access_token_duration: 15m
  issuer: "farmanexo-catalog-service"

redis:
  host: ${REDIS_HOST}
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0
  max_retries: 3
  pool_size: 20

aws:
  region: ${AWS_REGION}
  endpoint: ""

sqs:
  catalog_events_queue_url: ${SQS_CATALOG_EVENTS_URL}

s3:
  products_bucket: "farmanexo-products"

log:
  level: warn
  encoding: json
