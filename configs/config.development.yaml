environment: development

server:
  host: 0.0.0.0
  port: 4003
  read_timeout: 15s
  write_timeout: 15s
  idle_timeout: 60s

database:
  host: ${DB_HOST}
  port: 5432
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  db_name: catalog_db
  schema: catalog
  sslmode: require
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

jwt:
  secret: ${JWT_SECRET}
  access_token_duration: 15m
  issuer: "farmanexo-catalog-service"

redis:
  host: ${REDIS_HOST}
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0
  max_retries: 3
  pool_size: 10

aws:
  region: ${AWS_REGION}
  endpoint: ""

sqs:
  catalog_events_queue_url: ${SQS_CATALOG_EVENTS_URL}

s3:
  products_bucket: "farmanexo-products"

services:
  pharmacy_service:
    base_url: ${PHARMACY_SERVICE_URL}

log:
  level: info
  encoding: json
